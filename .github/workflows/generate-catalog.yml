name: Generate file-based catalogs

on:
  push:
    branches:
      - main
    paths:
      - 'hack/update-bundle-*.sh'
      - 'hack/generate-catalogs.sh'
      - 'config/channels.yaml'
      - 'catalog/catalog-template.yaml'

env:
  BRANCH: actions/generate-catalog

jobs:
  update-catalog:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log into registry.redhat.io
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: registry.redhat.io
          username: ${{ secrets.RH_REGISTRY_USERNAME }}
          password: ${{ secrets.RH_REGISTRY_PASSWORD}}

      - name: Get commit info
        id: get-commit-info
        run: |
          echo "short-sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate catalog
        run: |
          make generate-catalog

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: generate catalogs for ${{ steps.get-commit-info.outputs.short-sha }}"
          title: "Generate file-based catalogs for ${{ steps.get-commit-info.outputs.short-sha }}"
          body: "Regenerate catalogs from commit ${{ github.sha }}."
          branch: ${{ env.BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}
